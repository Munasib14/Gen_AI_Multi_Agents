name: Terraform Automation
on:
  push:
    branches:
    - main
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.2.6
    - name: Terraform Init
      run: terraform init
    - name: Check for Terraform files
      id: check-tf-files
      run: "tf_files=$(find . -name \"*.tf\")\nif [ -n \"$tf_files\" ]; then\n  echo\
        \ \"true\" > $GITHUB_OUTPUT\nelse\n  echo \"false\" > $GITHUB_OUTPUT\nfi\n"
    - name: Terraform Validate
      if: ${{ steps.check-tf-files.outputs.result == 'true' }}
      run: terraform validate
    - name: Terraform Plan
      if: ${{ steps.check-tf-files.outputs.result == 'true' }}
      run: terraform plan
    - name: Terraform Apply
      if: ${{ github.event_name == 'workflow_dispatch' || steps.check-tf-files.outputs.result
        == 'true' }}
      run: terraform apply -auto-approve
      env:
        TF_PLAN: terraform plan -out=tfplan
