name: Terraform ARM
on:
  push:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install Python dependencies
      run: 'pip install -r requirements.txt

        '
    - name: Terraform init
      run: 'terraform init

        '
    - name: Terraform apply
      run: terraform apply -auto-approve
